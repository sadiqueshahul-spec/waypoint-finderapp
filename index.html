<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint — Route Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink: #10141a;
    --panel: #171d26;
    --panel-line: #2a3340;
    --paper: #e9ecf1;
    --muted: #7c8798;
    --route: #ff6a3d;
    --signal: #46d9c9;
    --warn: #ffb84d;
  }

  *{ box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  #map{
    position: absolute;
    inset: 0;
    z-index: 0;
    filter: saturate(0.85) brightness(0.95);
  }

  /* ---------- Top bar / search ---------- */
  .topbar{
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    pointer-events: none;
  }

  .brand{
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 12px 16px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    flex-shrink: 0;
  }

  .compass{
    width: 26px; height: 26px;
    flex-shrink: 0;
    animation: spin 40s linear infinite;
  }
  @keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .compass{ animation: none; } }

  .brand-text{
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .brand-text span{ color: var(--route); }

  .search-panel{
    pointer-events: auto;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 14px;
    flex: 1;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-row{
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    border: 1px solid var(--panel-line);
    border-radius: 7px;
    padding: 8px 10px;
  }
  .field-row .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.start{ background: var(--signal); box-shadow: 0 0 0 3px rgba(70,217,201,0.15);}
  .dot.end{ background: var(--route); box-shadow: 0 0 0 3px rgba(255,106,61,0.15);}

  .field-row input{
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .field-row input::placeholder{ color: var(--muted); }

  .field-row button.locate{
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    line-height: 1;
  }
  .field-row button.locate:hover{ color: var(--signal); }

  .go-btn{
    margin-top: 4px;
    background: var(--route);
    color: #1a0d05;
    border: none;
    border-radius: 7px;
    padding: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .go-btn:hover{ filter: brightness(1.08); }
  .go-btn:disabled{ background: var(--panel-line); color: var(--muted); cursor: not-allowed; }

  .suggestions{
    position: relative;
  }
  .suggestion-list{
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 7px;
    margin-top: 4px;
    max-height: 180px;
    overflow-y: auto;
    z-index: 1100;
    display: none;
  }
  .suggestion-list.show{ display: block; }
  .suggestion-item{
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 1px solid var(--panel-line);
  }
  .suggestion-item:last-child{ border-bottom: none; }
  .suggestion-item:hover{ background: var(--ink); color: var(--paper); }

  /* ---------- Readout panel (distance/duration) ---------- */
  .readout{
    position: absolute;
    bottom: 24px;
    left: 20px;
    z-index: 1000;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 14px 18px;
    display: none;
    gap: 24px;
    align-items: center;
  }
  .readout.show{ display: flex; }
  .readout-item{ display: flex; flex-direction: column; gap: 2px; }
  .readout-label{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .readout-value{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--signal);
  }
  .readout-value.route-color{ color: var(--route); }

  .clear-btn{
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .clear-btn:hover{ color: var(--paper); border-color: var(--muted); }

  /* ---------- Status ---------- */
  .status{
    position: absolute;
    bottom: 24px;
    right: 20px;
    z-index: 1000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 280px;
    display: none;
  }
  .status.show{ display: block; }
  .status.error{ color: var(--warn); border-color: var(--warn); }

  /* Leaflet control tweaks */
  .leaflet-control-attribution{
    background: rgba(23,29,38,0.85) !important;
    color: var(--muted) !important;
  }
  .leaflet-control-attribution a{ color: var(--signal) !important; }
  .leaflet-control-zoom a{
    background: var(--panel) !important;
    color: var(--paper) !important;
    border-color: var(--panel-line) !important;
  }

  @media (max-width: 640px){
    .topbar{ flex-direction: column; }
    .brand-text{ display: none; }
    .readout{ left: 20px; right: 20px; }
    .status{ left: 20px; right: 20px; bottom: 90px; max-width: none; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <svg class="compass" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="11.5" stroke="#46d9c9" stroke-width="1.5"/>
      <path d="M13 4 L15.2 12.8 L13 22 L10.8 12.8 Z" fill="#ff6a3d"/>
      <circle cx="13" cy="13" r="1.6" fill="#e9ecf1"/>
    </svg>
    <div class="brand-text">Way<span>point</span></div>
  </div>

  <div class="search-panel">
    <div class="field-row suggestions">
      <div class="dot start"></div>
      <input id="start-input" type="text" placeholder="Start location (or use your position)" autocomplete="off" />
      <button class="locate" id="locate-btn" title="Use my location">◎</button>
      <div class="suggestion-list" id="start-suggestions"></div>
    </div>
    <div class="field-row suggestions">
      <div class="dot end"></div>
      <input id="end-input" type="text" placeholder="Search destination…" autocomplete="off" />
      <div class="suggestion-list" id="end-suggestions"></div>
    </div>
    <button class="go-btn" id="route-btn">Plot route</button>
  </div>
</div>

<div class="readout" id="readout">
  <div class="readout-item">
    <div class="readout-label">Distance</div>
    <div class="readout-value" id="distance-value">—</div>
  </div>
  <div class="readout-item">
    <div class="readout-label">Duration</div>
    <div class="readout-value route-color" id="duration-value">—</div>
  </div>
  <button class="clear-btn" id="clear-btn">Clear</button>
</div>

<div class="status" id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){

  // ---------- Map setup ----------
  const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([20, 0], 3);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  const startIcon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:#46d9c9;border:3px solid #10141a;box-shadow:0 0 0 2px #46d9c9;"></div>',
    iconSize: [16,16], iconAnchor: [8,8]
  });
  const endIcon = L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:#ff6a3d;border:3px solid #10141a;box-shadow:0 0 0 2px #ff6a3d;"></div>',
    iconSize: [16,16], iconAnchor: [8,8]
  });

  let startMarker = null, endMarker = null, routeLine = null;
  let startCoords = null, endCoords = null;

  const statusEl = document.getElementById('status');
  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.add('show');
    statusEl.classList.toggle('error', !!isError);
  }
  function clearStatus(){
    statusEl.classList.remove('show');
  }

  // ---------- Geocoding (Nominatim) ----------
  async function geocode(query){
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    if(!res.ok) throw new Error('Geocoding request failed');
    return res.json();
  }

  function debounce(fn, delay){
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }

  function wireAutocomplete(inputEl, listEl, onPick){
    const doSearch = debounce(async () => {
      const q = inputEl.value.trim();
      if(q.length < 3){ listEl.classList.remove('show'); listEl.innerHTML=''; return; }
      try{
        const results = await geocode(q);
        if(results.length === 0){ listEl.classList.remove('show'); listEl.innerHTML=''; return; }
        listEl.innerHTML = results.map((r, i) =>
          `<div class="suggestion-item" data-idx="${i}">${r.display_name}</div>`
        ).join('');
        listEl.classList.add('show');
        listEl.querySelectorAll('.suggestion-item').forEach((el, i) => {
          el.addEventListener('click', () => {
            const r = results[i];
            inputEl.value = r.display_name;
            listEl.classList.remove('show');
            onPick({ lat: parseFloat(r.lat), lng: parseFloat(r.lon), label: r.display_name });
          });
        });
      }catch(e){
        console.error(e);
      }
    }, 400);

    inputEl.addEventListener('input', doSearch);
    document.addEventListener('click', (e) => {
      if(!listEl.contains(e.target) && e.target !== inputEl){
        listEl.classList.remove('show');
      }
    });
  }

  const startInput = document.getElementById('start-input');
  const endInput = document.getElementById('end-input');

  wireAutocomplete(startInput, document.getElementById('start-suggestions'), (loc) => {
    startCoords = loc;
    placeMarker('start', loc);
  });
  wireAutocomplete(endInput, document.getElementById('end-suggestions'), (loc) => {
    endCoords = loc;
    placeMarker('end', loc);
  });

  function placeMarker(which, loc){
    if(which === 'start'){
      if(startMarker) map.removeLayer(startMarker);
      startMarker = L.marker([loc.lat, loc.lng], { icon: startIcon }).addTo(map);
    } else {
      if(endMarker) map.removeLayer(endMarker);
      endMarker = L.marker([loc.lat, loc.lng], { icon: endIcon }).addTo(map);
    }
    fitToMarkers();
  }

  function fitToMarkers(){
    const pts = [];
    if(startMarker) pts.push(startMarker.getLatLng());
    if(endMarker) pts.push(endMarker.getLatLng());
    if(pts.length === 1){
      map.setView(pts[0], 13);
    } else if(pts.length === 2){
      map.fitBounds(L.latLngBounds(pts), { padding: [80, 80] });
    }
  }

  // ---------- Geolocation ----------
  document.getElementById('locate-btn').addEventListener('click', () => {
    if(!navigator.geolocation){
      setStatus('Geolocation is not supported by this browser.', true);
      return;
    }
    setStatus('Locating you…');
    navigator.geolocation.getCurrentPosition((pos) => {
      const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'My location' };
      startCoords = loc;
      startInput.value = 'My location';
      placeMarker('start', loc);
      clearStatus();
    }, (err) => {
      setStatus('Could not get your location: ' + err.message, true);
    });
  });

  // ---------- Routing (OSRM) ----------
  async function fetchRoute(start, end){
    const url = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Routing request failed');
    const data = await res.json();
    if(data.code !== 'Ok' || !data.routes || data.routes.length === 0){
      throw new Error('No route found between these points');
    }
    return data.routes[0];
  }

  function formatDistance(meters){
    if(meters >= 1000) return (meters/1000).toFixed(1) + ' km';
    return Math.round(meters) + ' m';
  }
  function formatDuration(seconds){
    const h = Math.floor(seconds/3600);
    const m = Math.round((seconds%3600)/60);
    if(h > 0) return `${h}h ${m}m`;
    return `${m} min`;
  }

  const readoutEl = document.getElementById('readout');
  const distanceValueEl = document.getElementById('distance-value');
  const durationValueEl = document.getElementById('duration-value');

  document.getElementById('route-btn').addEventListener('click', async () => {
    if(!startCoords || !endCoords){
      setStatus('Set both a start point and a destination first.', true);
      return;
    }
    setStatus('Calculating route…');
    try{
      const route = await fetchRoute(startCoords, endCoords);
      if(routeLine) map.removeLayer(routeLine);

      const latlngs = route.geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(latlngs, {
        color: '#ff6a3d',
        weight: 5,
        opacity: 0.9,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);

      map.fitBounds(routeLine.getBounds(), { padding: [80, 80] });

      distanceValueEl.textContent = formatDistance(route.distance);
      durationValueEl.textContent = formatDuration(route.duration);
      readoutEl.classList.add('show');
      clearStatus();
    }catch(e){
      console.error(e);
      setStatus(e.message || 'Something went wrong plotting the route.', true);
    }
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    if(routeLine) { map.removeLayer(routeLine); routeLine = null; }
    if(startMarker) { map.removeLayer(startMarker); startMarker = null; }
    if(endMarker) { map.removeLayer(endMarker); endMarker = null; }
    startCoords = null; endCoords = null;
    startInput.value = ''; endInput.value = '';
    readoutEl.classList.remove('show');
    clearStatus();
    map.setView([20, 0], 3);
  });

  // Allow Enter key to trigger routing from either field
  [startInput, endInput].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        document.getElementById('route-btn').click();
      }
    });
  });

})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waypoint — Route Finder (Google Maps)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink: #10141a;
    --panel: #171d26;
    --panel-line: #2a3340;
    --paper: #e9ecf1;
    --muted: #7c8798;
    --route: #ff6a3d;
    --signal: #46d9c9;
    --warn: #ffb84d;
  }

  *{ box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  #map{
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .topbar{
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    pointer-events: none;
  }

  .brand{
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 12px 16px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    flex-shrink: 0;
  }

  .compass{
    width: 26px; height: 26px;
    flex-shrink: 0;
    animation: spin 40s linear infinite;
  }
  @keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .compass{ animation: none; } }

  .brand-text{
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .brand-text span{ color: var(--route); }

  .search-panel{
    pointer-events: auto;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 14px;
    flex: 1;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-row{
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    border: 1px solid var(--panel-line);
    border-radius: 7px;
    padding: 8px 10px;
  }
  .field-row .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.start{ background: var(--signal); box-shadow: 0 0 0 3px rgba(70,217,201,0.15);}
  .dot.end{ background: var(--route); box-shadow: 0 0 0 3px rgba(255,106,61,0.15);}

  .field-row input{
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    min-width: 0;
  }
  .field-row input::placeholder{ color: var(--muted); }

  .field-row button.locate{
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    line-height: 1;
  }
  .field-row button.locate:hover{ color: var(--signal); }

  .go-btn{
    margin-top: 4px;
    background: var(--route);
    color: #1a0d05;
    border: none;
    border-radius: 7px;
    padding: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .go-btn:hover{ filter: brightness(1.08); }
  .go-btn:disabled{ background: var(--panel-line); color: var(--muted); cursor: not-allowed; }

  .readout{
    position: absolute;
    bottom: 24px;
    left: 20px;
    z-index: 1000;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 14px 18px;
    display: none;
    gap: 24px;
    align-items: center;
  }
  .readout.show{ display: flex; }
  .readout-item{ display: flex; flex-direction: column; gap: 2px; }
  .readout-label{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .readout-value{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--signal);
  }
  .readout-value.route-color{ color: var(--route); }

  .clear-btn{
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .clear-btn:hover{ color: var(--paper); border-color: var(--muted); }

  .status{
    position: absolute;
    bottom: 24px;
    right: 20px;
    z-index: 1000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 320px;
    display: none;
  }
  .status.show{ display: block; }
  .status.error{ color: var(--warn); border-color: var(--warn); }

  /* Google's autocomplete dropdown renders in a body-level .pac-container;
     restyle it to match the rest of the UI */
  .pac-container{
    background: var(--panel) !important;
    border: 1px solid var(--panel-line) !important;
    border-radius: 7px !important;
    font-family: 'IBM Plex Mono', monospace !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35) !important;
    margin-top: 4px;
  }
  .pac-item{
    color: var(--muted) !important;
    border-color: var(--panel-line) !important;
    font-size: 12px !important;
    padding: 6px 10px !important;
  }
  .pac-item:hover{ background: var(--ink) !important; }
  .pac-item-query{ color: var(--paper) !important; }
  .pac-icon{ display: none !important; }

  @media (max-width: 640px){
    .topbar{ flex-direction: column; }
    .brand-text{ display: none; }
    .readout{ left: 20px; right: 20px; }
    .status{ left: 20px; right: 20px; bottom: 90px; max-width: none; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <svg class="compass" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="11.5" stroke="#46d9c9" stroke-width="1.5"/>
      <path d="M13 4 L15.2 12.8 L13 22 L10.8 12.8 Z" fill="#ff6a3d"/>
      <circle cx="13" cy="13" r="1.6" fill="#e9ecf1"/>
    </svg>
    <div class="brand-text">Way<span>point</span></div>
  </div>

  <div class="search-panel">
    <div class="field-row">
      <div class="dot start"></div>
      <input id="start-input" type="text" placeholder="Start location (or use your position)" autocomplete="off" />
      <button class="locate" id="locate-btn" title="Use my location">◎</button>
    </div>
    <div class="field-row">
      <div class="dot end"></div>
      <input id="end-input" type="text" placeholder="Search destination…" autocomplete="off" />
    </div>
    <button class="go-btn" id="route-btn">Plot route</button>
  </div>
</div>

<div class="readout" id="readout">
  <div class="readout-item">
    <div class="readout-label">Distance</div>
    <div class="readout-value" id="distance-value">—</div>
  </div>
  <div class="readout-item">
    <div class="readout-label">Duration</div>
    <div class="readout-value route-color" id="duration-value">—</div>
  </div>
  <button class="clear-btn" id="clear-btn">Clear</button>
</div>

<div class="status" id="status"></div>

<script>
  let map, directionsService, directionsRenderer, startMarker, endMarker;
  let startPlace = null, endPlace = null;
  let geocoder;

  const statusEl = document.getElementById('status');
  function setStatus(msg, isError){
    statusEl.textContent = msg;
    statusEl.classList.add('show');
    statusEl.classList.toggle('error', !!isError);
  }
  function clearStatus(){ statusEl.classList.remove('show'); }

  // Dark, desaturated map style to match the panel palette
  const MAP_STYLE = [
    { elementType: "geometry", stylers: [{ color: "#171d26" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#10141a" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#7c8798" }] },
    { featureType: "road", elementType: "geometry", stylers: [{ color: "#2a3340" }] },
    { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#7c8798" }] },
    { featureType: "water", elementType: "geometry", stylers: [{ color: "#0d1620" }] },
    { featureType: "poi", elementType: "geometry", stylers: [{ color: "#1c232e" }] },
    { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
    { featureType: "transit", stylers: [{ visibility: "off" }] },
    { featureType: "administrative", elementType: "geometry", stylers: [{ color: "#2a3340" }] }
  ];

  function initMap(){
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 20, lng: 0 },
      zoom: 3,
      styles: MAP_STYLE,
      disableDefaultUI: false,
      fullscreenControl: false,
      streetViewControl: false,
      mapTypeControl: false
    });

    geocoder = new google.maps.Geocoder();
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map,
      suppressMarkers: true,
      polylineOptions: {
        strokeColor: '#ff6a3d',
        strokeWeight: 5,
        strokeOpacity: 0.9
      }
    });

    const startInput = document.getElementById('start-input');
    const endInput = document.getElementById('end-input');

    const startAutocomplete = new google.maps.places.Autocomplete(startInput, { fields: ['geometry', 'name', 'formatted_address'] });
    const endAutocomplete = new google.maps.places.Autocomplete(endInput, { fields: ['geometry', 'name', 'formatted_address'] });

    startAutocomplete.addListener('place_changed', () => {
      const place = startAutocomplete.getPlace();
      if(!place.geometry) return;
      startPlace = place.geometry.location;
      placeMarker('start', startPlace);
    });

    endAutocomplete.addListener('place_changed', () => {
      const place = endAutocomplete.getPlace();
      if(!place.geometry) return;
      endPlace = place.geometry.location;
      placeMarker('end', endPlace);
    });

    document.getElementById('locate-btn').addEventListener('click', () => {
      if(!navigator.geolocation){
        setStatus('Geolocation is not supported by this browser.', true);
        return;
      }
      setStatus('Locating you…');
      navigator.geolocation.getCurrentPosition((pos) => {
        const loc = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
        startPlace = loc;
        startInput.value = 'My location';
        placeMarker('start', loc);
        clearStatus();
      }, (err) => {
        setStatus('Could not get your location: ' + err.message, true);
      });
    });

    document.getElementById('route-btn').addEventListener('click', plotRoute);
    document.getElementById('clear-btn').addEventListener('click', clearAll);

    [startInput, endInput].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') e.preventDefault(); // avoid accidental form submits; use Places dropdown or Plot route button
      });
    });
  }

  function placeMarker(which, location){
    const icon = {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 7,
      fillColor: which === 'start' ? '#46d9c9' : '#ff6a3d',
      fillOpacity: 1,
      strokeColor: '#10141a',
      strokeWeight: 3
    };
    if(which === 'start'){
      if(startMarker) startMarker.setMap(null);
      startMarker = new google.maps.Marker({ position: location, map, icon });
    } else {
      if(endMarker) endMarker.setMap(null);
      endMarker = new google.maps.Marker({ position: location, map, icon });
    }
    fitToMarkers();
  }

  function fitToMarkers(){
    const bounds = new google.maps.LatLngBounds();
    let count = 0;
    if(startMarker){ bounds.extend(startMarker.getPosition()); count++; }
    if(endMarker){ bounds.extend(endMarker.getPosition()); count++; }
    if(count === 1){
      map.setCenter(bounds.getCenter());
      map.setZoom(13);
    } else if(count === 2){
      map.fitBounds(bounds, 80);
    }
  }

  const readoutEl = document.getElementById('readout');
  const distanceValueEl = document.getElementById('distance-value');
  const durationValueEl = document.getElementById('duration-value');

  function plotRoute(){
    if(!startPlace || !endPlace){
      setStatus('Set both a start point and a destination first.', true);
      return;
    }
    setStatus('Calculating route…');
    directionsService.route({
      origin: startPlace,
      destination: endPlace,
      travelMode: google.maps.TravelMode.DRIVING
    }, (result, status) => {
      if(status !== 'OK'){
        setStatus('Could not find a route: ' + status, true);
        return;
      }
      directionsRenderer.setDirections(result);
      const leg = result.routes[0].legs[0];
      distanceValueEl.textContent = leg.distance.text;
      durationValueEl.textContent = leg.duration.text;
      readoutEl.classList.add('show');
      clearStatus();
    });
  }

  function clearAll(){
    directionsRenderer.setDirections({ routes: [] });
    if(startMarker){ startMarker.setMap(null); startMarker = null; }
    if(endMarker){ endMarker.setMap(null); endMarker = null; }
    startPlace = null; endPlace = null;
    document.getElementById('start-input').value = '';
    document.getElementById('end-input').value = '';
    readoutEl.classList.remove('show');
    clearStatus();
    map.setCenter({ lat: 20, lng: 0 });
    map.setZoom(3);
  }

  window.initMap = initMap;
</script>

<!-- Replace YOUR_API_KEY_HERE with your own Google Maps API key -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places&callback=initMap">
</script>

</body>
</html>
